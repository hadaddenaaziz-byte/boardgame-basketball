<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Basketball Scoreboard</title>
</head>
<body>
    <div class="container">
        <div class="group">
            <h3>Home</h3>
                <P id="sum1-el">0</P>
                <div class="btn">
                    <button id="btn1-el" onclick="incOne()">+1</button>
                    <button id="btn2-el" onclick="incTwo()">+2</button>
                    <button id="btn3-el" onclick="incThree()">+3</button>
                </div>
        </div>
        
        <div class="group">
            <h3>Guest</h3>
                <P id="sum2-el">0</P>
                <div class="btn">
                    <button id="btn12-el" onclick="incSecOne()">+1</button>
                    <button id="btn22-el" onclick="incSecTwo()">+2</button>
                    <button id="btn23-el" onclick="incSecThree()">+3</button>
                </div>
        </div>
    </div>
    
    <script src="index.js"></script>
</body>
</html>
